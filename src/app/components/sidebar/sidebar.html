<mat-drawer-container class="app-container" autosize>
  <mat-drawer #drawer class="sidenav" mode="side" opened="true">
    <h4 class="text-center mt-2">Invogenix</h4>
    <app-menu></app-menu>
  </mat-drawer>

  <div class="sidenav-content">
    <app-header (toggle)="drawer.toggle()"></app-header>
    <div class="px-4 py-2">
        <app-main-layout-component></app-main-layout-component>
    </div>
  </div>

</mat-drawer-container>
