<div>
    <div class="app-card p-0">
        <form>
            <h5 class="px-4 pt-3">Company Profile</h5>
            <hr class="mb-0"/>

            <div class="p-4 org-card">
                <div>
                    <h6 class="text-muted">Company Information</h6>
                    <hr/>
                    <div class="row">
                        <div class="col-md-6 col-sm-12 col-12 form-group mb-2">
                            <label class="fw-semibold"> Company Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter Company Name">
                        </div>

                        <div class="col-md-6 col-sm-12 col-12 form-group mb-2">
                            <label class="fw-semibold"> Address <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter Address">
                        </div>

                        <div class="col-md-6 col-sm-12 col-12 form-group">
                            <label class="fw-semibold"> CIN Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter CIN Number">
                        </div>

                        <div class="col-md-6 col-sm-12 col-12 form-group">
                            <label class="fw-semibold"> GST Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter GST Number">
                        </div>

                    </div>
                </div>

                <div>
                    <h5 class="text-muted fw-bold">Beneficiary Bank Information</h5>
                    <hr/>
                    <div class="row">
                        <div class="col-md-6 col-sm-12 col-12 form-group mb-2">
                            <label> Bank Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter Bank Name">
                        </div>

                        <div class="col-md-6 col-sm-12 col-12 form-group mb-2">
                            <label> Bank  Address <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter Bank Address">
                        </div>

                        <div class="col-md-6 col-sm-12 col-12 form-group">
                            <label> SWIFT Code <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter SWIFT Code">
                        </div>
                        <div class="col-md-6 col-sm-12 col-12 form-group">
                            <label> IFSC Code <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter IFSC Code">
                        </div>

                    </div>
                </div>

                <div>
                    <h5 class="text-muted fw-bold">Remitting Bank Information</h5>
                    <hr/>
                    <div class="row">
                        <div class="col-md-3 col-sm-12 col-12 form-group mb-2">
                            <label> Name of Bank <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter Bank Name">
                        </div>

                        <div class="col-md-3 col-sm-12 col-12 form-group mb-2">
                            <label> A/C No <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter Bank Address">
                        </div>

                        <div class="col-md-3 col-sm-12 col-12 form-group">
                            <label> Swift Code <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter SWIFT Code">
                        </div>
                        <div class="col-md-3 col-sm-12 col-12 form-group">
                            <label> IBAN No <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" placeholder="Enter IBAN No">
                        </div>

                        <div>
                    <h5 class="text-muted fw-bold">Authorized Signatories</h5>
                    <hr/>
                    <div class="row">
                        <div class="col-md-6 col-sm-12 col-12 form-group mb-4">
                            <label> Upload Signature</label>
                            <input type="file" class="form-control">
                            if(file){
                                <div class="preview">
                                    <img src="{{file}}" alt="">
                                </div>
                            }
                            <!-- <app-image-upload 
                                label="Upload Signature" 
                                [showList]="false"
                            ></app-image-upload> -->
                        </div>

                        <div class="col-md-6 col-sm-12 col-12 form-group mb-2">
                            <label> Upload Company Stamp</label>
                            <input type="file" class="form-control">
                        </div>

                        <div class="col-md-6 col-sm-12 col-12 form-group">
                            <label> Signatory Name </label>
                            <input type="text" class="form-control" placeholder="e.g., John Doe">
                        </div>
                        <div class="col-md-6 col-sm-12 col-12 form-group">
                            <label> Designation </label>
                            <input type="text" class="form-control" placeholder="e.g., Director">
                        </div>

                    </div>
                </div>

                    </div>
                </div>

                <hr/>

                <div class="btn-group gap-3 float-end">
                    <button class="btn btn-md btn-primary rounded p-2 px-5"><fa-icon [icon]="faPrint" /> Save Changes</button>
                </div>
            </div>

        </form>
    </div>
</div>
