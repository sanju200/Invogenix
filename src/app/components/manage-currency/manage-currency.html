<div class="m-1">
    <div class="project-card p-4 m-2">
        <h5>Add Currency Account</h5>
        <hr/>
        <div class="row">
            <div class="col-4 form-group">
                <label>Currency</label>
                <select class="form-control">
                    <option value="">Select Currency</option>
                    @for(curr of currencyData; track curr){
                        <option [value]="curr.code">{{curr.label}}</option>
                    }
                </select>
            </div>
            <div class="col-6 form-group">
                <label>Account Number</label>
                <input type="text" class="form-control" placeholder="Enter Account Number">
            </div>
            <div class="col-2 mt-2">
                <button class="btn btn-primary mt-4 w-75"><fa-icon [icon]="faCopy"></fa-icon> Save</button>
            </div>
        </div>
    </div>

    <div class="project-card p-4 my-4 mx-2">
        <h5>Currency Account</h5>
        <hr/>
        <div class="px-2">
        <table class="table">
            <thead>
                <tr>
                    <th>Currency</th>
                    <th>Account</th>
                    <th class="text-end">Action</th>
                </tr>
            </thead>
            <tbody>
                @for(acc of accounts; track acc){
                    <tr>
                        <td class="py-2">{{acc.currency}}</td> 
                        <td class="py-2">
                            @if(!visibleAccounts[acc.id]){
                                XXXXXXXX{{acc.last4}} <fa-icon class="mx-2 cursor-pointer" (click)="$event.stopPropagation(); showAccountNum(acc)" [icon]="faEye"></fa-icon>
                            }@else{
                                {{acc.accountNumber}} <fa-icon class="mx-2 cursor-pointer" (click)="$event.stopPropagation(); showAccountNum(acc)" [icon]="faEyeSlash"></fa-icon>
                            }
                        </td>
                        <td class="py-2 text-end">
                            <fa-icon class="text-primary me-2" [icon]="faEdit"></fa-icon>
                            <fa-icon class="text-danger" [icon]="faTrash"></fa-icon>
                        </td>
                       
                    </tr>
                }
            </tbody>
        </table>
    </div>
    </div>
    
   
</div>
