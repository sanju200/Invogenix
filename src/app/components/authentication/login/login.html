<div class="login-wrapper">
    <div class="app-card hover-effect">
        <h1 class="text-h1">Welcome Back</h1>
        <p class="text-body color-text-secondary">Please enter your details to sign in</p>
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group" style="margin-top: 2rem;">
            <label class="text-small font-semibold">Email Address</label>
            <input type="email" formControlName="email" placeholder="name@example.com">
        </div>
        
        <div class="form-group" style="margin-top: 1.25rem;">
            <label class="text-small font-semibold">Password</label>
            <input type="password" formControlName="password" placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem;">Sign In</button>
        
        <p class="text-small text-center" style="margin-top: 1.5rem;">
            Don't have an account? <a href="/signup" class="color-primary font-semibold">Register</a>
        </p>
        </form>
    </div>
</div>
