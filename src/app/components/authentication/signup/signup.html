<div class="signup-wrapper">
    <div class="app-card hover-effect">
        <h1 class="text-h1">Create Account</h1>
        <p class="text-body color-text-secondary">Join us and start your journey today</p>
        
        <div class="form-group" style="margin-top: 2rem;">
            <label class="text-small font-semibold">Full Name</label>
            <input type="text" placeholder="John Doe">
        </div>

        <div class="form-group">
            <label class="text-small font-semibold">Email Address</label>
            <input type="email" placeholder="name@example.com">
        </div>
        
        <div class="form-group">
            <label class="text-small font-semibold">Password</label>
            <input type="password" placeholder="••••••••">
        </div>
        
        <button class="btn-primary" style="width: 100%; margin-top: 1.5rem;">Register Now</button>
        
        <p class="text-small text-center" style="margin-top: 1.5rem;">
            Already have an account? <a href="/login" class="color-primary font-semibold">Sign In</a>
        </p>
    </div>
</div>
